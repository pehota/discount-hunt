---
# docs/product/journeys/weekly-discount-meal-planning.yaml
# SSOT journey schema for discount-hunt
# Bootstrapped during DISCUSS wave 2026-07-13
schema_version: 1

journey:
  name: "Weekly Discount Meal Planning"
  goal: "Dimitar opens the app on Monday morning and walks away with a 7-day meal plan built around this week's supermarket discounts, knowing exactly how much he will save vs full-price shopping."
  persona: "dimitar"
  jobs:
    - JOB-001
    - JOB-002
    - JOB-003

  emotional_arc:
    start: "Curious but mildly sceptical — will the discounts be real and useful?"
    middle: "Engaged and hopeful as the plan takes shape around real prices"
    end: "Satisfied and motivated — concrete savings number closes the loop"

steps:

  - id: 1
    name: "View this week's discounts"
    trigger: "Monday morning; Dimitar opens the app (browser tab)"
    action: "Navigate to the app; dashboard loads with this week's discount feed"

    ui_mockup: |
      +-- Discount Hunt — Week of 14 Jul 2026 --------------------------------+
      |                                                                        |
      |  THIS WEEK'S DEALS                             Last refreshed: Mon 06:00  |
      |  ─────────────────────────────────────────────────────────────────    |
      |  Aldi Süd                                                              |
      |    Bio Haferflocken 500g        €1.49  (was €2.29)  save €0.80       |
      |    Mozzarella 125g              €0.69  (was €0.99)  save €0.30       |
      |    Rote Linsen 500g             €1.19  (was €1.79)  save €0.60       |
      |                                                                        |
      |  Edeka                                                                 |
      |    Campari Tomaten 500g         €1.29  (was €1.99)  save €0.70       |
      |    Gouda jung 400g              €2.49  (was €3.29)  save €0.80       |
      |                                                                        |
      |  V-Markt                                                               |
      |    Basmati Reis 1kg             €2.19  (was €2.99)  save €0.80       |
      |    Bio Paprika (3er)            €1.79  (was €2.49)  save €0.70       |
      |                                                                        |
      |  [ Generate Meal Plan ]                                                |
      +------------------------------------------------------------------------+

    shared_artifacts:
      - name: "discount_feed"
        source: "database: discount_items table (regular_price, sale_price, store, valid_until)"
        displayed_as: "item name, sale price, was-price, savings"
        consumers: ["step 2 (meal plan generation)", "step 4 (savings tracker)"]
      - name: "refresh_timestamp"
        source: "database: scrape_jobs table (last_successful_run)"
        displayed_as: "Last refreshed: Mon 06:00"
        consumers: ["step 1 (header)"]

    emotional_state:
      entry: "Curious — is anything useful on sale this week?"
      exit: "Hopeful — several relevant items visible, discounts look real"

    integration_checkpoint: |
      discount_feed populated by scraper run (scheduled weekly).
      Must display regular_price AND sale_price — both required for savings calculation.
      If scraper failed: show last-known data with staleness warning.

    failure_modes:
      - "Scraper failed this week: show stale data with 'Last refreshed: 6 days ago — data may be outdated' warning"
      - "No discounts match dietary restrictions: show 'No compatible discounts found this week' with manual refresh option"
      - "One store unavailable: show available stores only, indicate which store is missing"

    usability:
      # Added by feature discount-hunt-ui (2026-07-15). Presentation dimension only —
      # the feed already ships (grouped by store, was/sale price, staleness warnings).
      mobile_readability: >
        Feed must be readable at 375px with no horizontal scroll (site nav + card-grid).
        Card-grid already collapses to single column; nav responsiveness is the risk (SLICE-01).
      glanceability: >
        Each card should show the explicit per-item saving (save €X) so the deal is legible
        without mental arithmetic — matches the mockup "save €0.80" (SLICE-04).

    gherkin: |
      Scenario: Dimitar sees this week's discount feed on Monday
        Given it is Monday and the weekly scraper has completed successfully
        And the scraper found at least one discounted item matching Dimitar's dietary restrictions
        When Dimitar opens the app
        Then the dashboard displays discounted items grouped by store
        And each item shows both the sale price and the original regular price
        And a "Last refreshed" timestamp shows when the data was fetched
        And a "Generate Meal Plan" button is visible

      Scenario: Dimitar reads the discount feed on his phone (UI polish — feature discount-hunt-ui)
        Given Dimitar opens the app on a 375px-wide phone screen
        When the discount feed renders
        Then the site navigation and discount cards fit the screen width with no horizontal scroll
        And each discount card shows an explicit "save €X" amount

      Scenario: Discount feed is stale due to scraper failure
        Given the weekly scraper has not run successfully in the past 5 days
        When Dimitar opens the app
        Then the dashboard shows the last-known discounts
        And a warning banner reads "Data may be outdated — last refresh was {N} days ago"
        And the "Generate Meal Plan" button remains available

  - id: 2
    name: "Generate discount-driven meal plan"
    trigger: "Dimitar clicks 'Generate Meal Plan'"
    action: "Backend builds a 7-day meal plan prioritising discounted ingredients; matches recipe for each day"

    ui_mockup: |
      +-- Meal Plan — Week of 14 Jul 2026 ------------------------------------+
      |                                                                        |
      |  MONDAY                                                                |
      |    Lunch: Red Lentil Soup              🥕 Rote Linsen ON SALE €1.19  |
      |    Dinner: Caprese Salad               🧀 Mozzarella ON SALE €0.69  |
      |                                                                        |
      |  TUESDAY                                                               |
      |    Lunch: Tomato Rice Bowl             🍅 Campari Tomaten SALE €1.29 |
      |    Dinner: Cheesy Pasta Bake           🧀 Gouda ON SALE €2.49       |
      |                                                                        |
      |  WEDNESDAY                                                             |
      |    Lunch: Paprika & Rice Stir-fry      🫑 Bio Paprika ON SALE €1.79 |
      |    Dinner: Lentil Dal                  🥕 Rote Linsen (from stock)  |
      |  ...                                                                   |
      |                                                                        |
      |  Estimated savings this week: €8.40                                   |
      |  [ View full recipes ]   [ Download shopping list ]                   |
      +------------------------------------------------------------------------+

    shared_artifacts:
      - name: "meal_plan"
        source: "database: meal_plans table (plan_id, week_start, meals JSON)"
        displayed_as: "day-by-day meal schedule with ingredient highlight"
        consumers: ["step 3 (recipe view)", "step 4 (savings tracker)"]
      - name: "estimated_savings"
        source: "computed: SUM(regular_price - sale_price) for all discounted items in plan"
        displayed_as: "Estimated savings this week: €X.XX"
        consumers: ["step 2 (meal plan footer)", "step 4 (savings tracker)"]
      - name: "dietary_filter"
        source: "database: user_settings table (dietary_restrictions array)"
        displayed_as: "applied silently; restricts recipe and ingredient pool"
        consumers: ["step 2 (meal plan generation)", "step 3 (recipe view)"]

    emotional_state:
      entry: "Expectant — will the plan be practical and edible?"
      exit: "Pleased — plan is built around real discounts and matches dietary needs; savings estimate is visible"

    integration_checkpoint: |
      meal_plan references discount_feed items by item_id.
      dietary_filter applied before recipe matching — no incompatible meals in output.
      estimated_savings uses sale_price and regular_price from discount_items table.

    failure_modes:
      - "Too few discounted items to fill 7 days: fill remaining days with budget-friendly non-sale items; mark them differently"
      - "No compatible recipe found for a discounted item: skip that item from plan; log for future recipe expansion"
      - "Dietary restriction yields zero valid meals: show error 'Cannot generate plan with current restrictions — consider relaxing restrictions or checking settings'"

    usability:
      # Added by feature discount-hunt-ui (2026-07-15). Presentation dimension only.
      discount_visibility: >
        Each planned meal that uses a discounted item must show that item's store and sale
        price INLINE in the plan (currently only visible after clicking into recipe detail).
        This is what makes the plan feel discount-driven at the accept/regenerate moment (SLICE-02).
      mobile_readability: >
        The plan table must be readable at 375px with no horizontal scroll. Adding per-meal
        store + price WIDENS the table, so the mobile-survivable layout (SLICE-01) must land
        first; the added content stacks rather than overflows.

    gherkin: |
      Scenario: Dimitar generates a 7-day meal plan driven by this week's discounts
        Given the discount feed contains at least 5 items compatible with Dimitar's dietary restrictions
        When Dimitar clicks "Generate Meal Plan"
        Then a 7-day meal plan is displayed
        And at least 70% of meals highlight a discounted ingredient
        And no meal contains ingredients excluded by Dimitar's dietary restrictions
        And an estimated weekly savings amount is shown in euros

      Scenario: Dimitar sees the discount behind each meal without leaving the plan (UI polish — feature discount-hunt-ui)
        Given a meal plan has been generated and at least one meal uses a discounted item
        When Dimitar views the plan
        Then each meal that uses a discounted item shows that item's store and sale price inline
        And meals that use no discounted item are visually differentiated
        And the plan is readable at 375px with no horizontal scroll

      Scenario: Dietary restrictions filter the plan correctly
        Given Dimitar has "vegetarian" set as his dietary restriction
        And the discount feed includes both meat and vegetarian items
        When Dimitar generates a meal plan
        Then no meal plan entry includes meat or fish
        And all suggested recipes are vegetarian

  - id: 3
    name: "View recipe for a meal"
    trigger: "Dimitar clicks 'View full recipes' or a specific meal title"
    action: "Recipe detail view opens with ingredients, preparation steps, and source link"

    ui_mockup: |
      +-- Recipe: Red Lentil Soup -----------------------------------------+
      |                                                                      |
      |  Source: AllRecipes  [ Open original recipe ↗ ]                     |
      |                                                                      |
      |  INGREDIENTS (serves 4)                                              |
      |    ✓ Rote Linsen 500g          ON SALE at Aldi Süd — €1.19         |
      |    ✓ Campari Tomaten 500g      ON SALE at Edeka — €1.29            |
      |      Vegetable broth           (not on sale — pantry staple)       |
      |      Cumin, paprika            (spices — pantry)                   |
      |                                                                      |
      |  PREPARATION                                                         |
      |    1. Rinse lentils under cold water...                              |
      |    2. Sauté onion and garlic...                                      |
      |    ...                                                               |
      |                                                                      |
      |  [ ← Back to meal plan ]                                             |
      +----------------------------------------------------------------------+

    shared_artifacts:
      - name: "recipe_link"
        source: "database: recipes table (recipe_id, title, source_url, ingredients JSON)"
        displayed_as: "recipe title, ingredient list, source link"
        consumers: ["step 3 (recipe detail view)", "step 2 (meal plan — linked)"]

    emotional_state:
      entry: "Practical — need to verify recipe is feasible before committing"
      exit: "Confident — recipe is real, manageable, uses the sale items"

    integration_checkpoint: |
      recipe_link populated by recipe-matching engine (source API / static DB — TBD in DESIGN wave).
      Ingredient list highlights which items are in discount_feed for this week.

    failure_modes:
      - "Recipe source link dead (404): show cached recipe data; display 'Original source unavailable — showing cached version'"
      - "No recipe found for a meal: show 'Recipe not available — search manually' with ingredient list only"

    gherkin: |
      Scenario: Dimitar views a recipe linked from the meal plan
        Given a meal plan has been generated and contains at least one meal
        When Dimitar clicks on a meal title
        Then a recipe detail view opens for that meal
        And the ingredient list highlights which items are currently on sale
        And the original recipe source is linked with a working URL
        And a "Back to meal plan" link is visible

  - id: 4
    name: "Review weekly and monthly savings"
    trigger: "Dimitar navigates to the Savings tab (or it is shown post-plan-generation)"
    action: "Savings dashboard shows this week's savings, running monthly total, historical chart"

    ui_mockup: |
      +-- Savings Tracker --------------------------------------------------+
      |                                                                      |
      |  THIS WEEK (14–20 Jul 2026)                                          |
      |    Items bought on discount:  7                                      |
      |    Total paid (sale prices):  €12.33                                 |
      |    Would have paid (regular): €20.73                                 |
      |    SAVED:                     €8.40   ████████████░░░░░░░░          |
      |                                                                      |
      |  MONTH TO DATE (Jul 2026)                                            |
      |    Saved so far:              €8.40                                  |
      |    Projected (4 weeks):       €33.60                                 |
      |                                                                      |
      |  HISTORY                                                             |
      |    Week of 7 Jul:    €11.20                                          |
      |    Week of 30 Jun:   €9.80                                           |
      |    Week of 23 Jun:   €7.60                                           |
      |                                                                      |
      +----------------------------------------------------------------------+

    shared_artifacts:
      - name: "savings_record"
        source: "database: savings_log table (week_start, items_used, total_sale, total_regular, saved)"
        displayed_as: "weekly savings breakdown + monthly total + history list"
        consumers: ["step 4 (savings dashboard)"]
      - name: "regular_price_baseline"
        source: "database: discount_items.regular_price (captured at scrape time)"
        displayed_as: "Would have paid: €XX.XX"
        consumers: ["step 4 (savings dashboard)", "step 2 (estimated savings footer)"]

    emotional_state:
      entry: "Curious — did I actually save anything meaningful?"
      exit: "Motivated and satisfied — concrete number validates the effort of planning around discounts"

    integration_checkpoint: |
      savings_record populated when user confirms meal plan (or approximated from plan alone).
      regular_price_baseline captured at scrape time — must persist even after promotional period ends.
      History chart meaningful only after 2+ weeks of data.

    failure_modes:
      - "First week (no history): show 'This is your first week — history will build over time' with current week only"
      - "No prices captured (scraper missing regular_price): show 'Savings comparison unavailable — regular prices not captured this week'"

    usability:
      # Added by feature discount-hunt-ui (2026-07-15). Presentation dimension only.
      headline_emphasis: >
        The weekly SAVED figure must be the visually dominant, first element on the page
        (currently the third equal-weight line after Paid / Would-have-paid). The payoff of
        JOB-002 only lands emotionally if the saved number is the hero (SLICE-03).
      mobile_readability: >
        The SAVED hero figure must be legible above the fold at 375px with no horizontal scroll.
        The load-bearing data-* attributes (data-week-saved, data-saved-amount, data-month-to-date)
        must survive any presentation change (D23 acceptance-suite structural assertions).

    gherkin: |
      Scenario: Dimitar reviews his savings after the first week
        Given a meal plan was generated and the discount data included regular prices
        When Dimitar navigates to the Savings tab
        Then this week's total savings are displayed in euros
        And the comparison between total sale prices and total regular prices is visible
        And a savings history section is shown (even if it contains only the current week)

      Scenario: Dimitar registers his savings at a glance on his phone (UI polish — feature discount-hunt-ui)
        Given Dimitar has at least one week of savings recorded
        When he opens the Savings page on a 375px-wide phone screen
        Then the weekly SAVED amount is the first and most prominent figure on the page
        And it is legible above the fold with no horizontal scroll

      Scenario: Savings history grows over multiple weeks
        Given Dimitar has used the app for 3 consecutive weeks
        When he views the Savings tab
        Then the history section shows 3 weekly entries with individual savings amounts
        And the month-to-date total is the sum of those weeks

integration_validation:
  shared_artifact_consistency:
    - artifact: "regular_price"
      must_match_across: [1, 2, 4]
      failure_message: "Regular price shown in discount feed (step 1) must match the baseline used in savings calculation (step 4). Both read from discount_items.regular_price."
    - artifact: "dietary_filter"
      must_match_across: [2, 3]
      failure_message: "Dietary restrictions applied during meal plan generation (step 2) must also filter ingredient lists in recipe view (step 3)."
    - artifact: "estimated_savings"
      must_match_across: [2, 4]
      failure_message: "Savings estimate shown on meal plan (step 2) must equal actual savings record in savings tracker (step 4)."

# ─────────────────────────────────────────────────────────────────────────────
# CHANGED ASSUMPTIONS (feature meal-plan-engine, 2026-07-17)
# Additive note — DISCOVER-era steps above are UNCHANGED. The meal-plan ENGINE that
# realizes step 2 is being replaced; the journey's flow gains a draft lifecycle.
# Full detail + rationale: docs/feature/meal-plan-engine/feature-delta.md.
# ─────────────────────────────────────────────────────────────────────────────
changed_assumptions:
  - was: >
      Meal name IS the discounted item's name; the plan is 14 slots filled by round-robin over the
      selected discount items (placeholder). Generation AUTO-SAVES a non-empty plan; 1 plan/week frozen.
      estimated_savings = sum over the whole selected basket.
    now: >
      Each meal is a REAL web recipe (never LLM-invented — JOB-003 dietary safety) built from this
      week's discounted products; product selection minimizes total € to feed the week, preferring
      discounts where cheapest (D7). Generation produces a THROWAWAY DRAFT (not saved) that the user
      REGENERATES-WHOLE (v1) and then explicitly SAVES or DISCARDS; on Save the user is prompted to add
      the plan's discounted items to the shopping list (D4, closes the JOB-004 loop). Savings/spend are
      computed over the DEDUPED set of discounted products actually used by the plan's meals.
    v2_deferred: >
      Per-meal accept + partial regenerate + cross-source stickiness (D3) are deferred to v2 (D5/D8).
    flow_shape: >
      trigger source (feed selection | all discounts | shopping list, per D2)
        -> generate DRAFT of real cost-aware recipes
        -> experiment (regenerate WHOLE draft; v2: keep accepted meals)
        -> Save / Discard
        -> (on Save) add plan's discounts to the shopping list (D4).

changelog:
  - date: "2026-07-13"
    feature: "discount-hunt"
    change: "Initial journey schema bootstrapped during DISCUSS wave (greenfield)"
  - date: "2026-07-15"
    feature: "discount-hunt-ui"
    change: >
      Added a usability (presentation) dimension to steps 1, 2, and 4 and one UI-polish
      Gherkin scenario per step. Flow is unchanged — this feature polishes the already-shipped
      shell (styled layout + responsive card-grid, phases 05–08) for mobile readability and
      glanceability. Step 3 (recipe detail) already ships store+price inline; no delta added.
  - date: "2026-07-17"
    feature: "meal-plan-engine"
    change: >
      Added a changed_assumptions block: step 2's meal-plan ENGINE moves from round-robin item-name
      placeholder + auto-save to REAL web-recipe generation (never LLM-invented) with a cost objective
      (cheapest weekly shop, prefer discounts — D7) and a throwaway-draft lifecycle (regenerate-whole,
      explicit Save/Discard, Save->add-to-list per D4). Trigger location determines the source (D2).
      v2 adds per-meal lock + partial regenerate + cross-source stickiness (D3). DISCOVER-era steps are
      unchanged; no second journey minted (the list-centric spine stays in
      grocery-expenditure-control.yaml). See docs/feature/meal-plan-engine/feature-delta.md.
