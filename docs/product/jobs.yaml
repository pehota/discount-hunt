---
# docs/product/jobs.yaml
# SSOT: validated job stories for discount-hunt
# Bootstrapped during DISCUSS wave 2026-07-13
# Format: each job has id, statement (job story format), dimensions, four_forces, opportunity_score
#
# ─────────────────────────────────────────────────────────────────────────────
# JOB HIERARCHY (reframed by feature `product-overhaul`, 2026-07-15)
#   PRIMARY:     JOB-004  Control grocery spend across the whole shop (NEW)
#   SUPPORTING:  JOB-002  Track savings vs full price  (retrospective half of JOB-004; re-parented)
#   SUPPORTING:  JOB-001  Discount-driven meal planning (inspiration/decision support for the shop)
#   SUPPORTING:  JOB-003  Dietary-restriction compliance (safety constraint on any plan/list)
#
# See jobs.yaml `hierarchy:` block at the bottom and the Changed-Assumptions section in
# docs/feature/product-overhaul/feature-delta.md for the full rationale. IDs are STABLE:
# JOB-001/002/003 keep their identifiers verbatim (shipped stories carry these job_ids).
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  - id: JOB-004
    title: "Control grocery spend across the whole shop"
    # PRIMARY job as of feature product-overhaul (2026-07-15). Solution-neutral: this job is about
    # KNOWING and CONTROLLING what a shop will cost BEFORE and DURING assembly — forward-looking spend
    # control, of which JOB-002 (savings tracking) is the retrospective, after-the-fact half.
    statement: >
      When I am putting together my household grocery shop for the week (for me and my wife),
      I want to assemble the exact set of items I intend to buy — favouring what is cheapest
      right now but including whatever we actually need — and see the running total as I build it,
      so I can decide what to buy and know what the shop will cost before I ever leave for the store,
      instead of discovering the total at the till.
    dimensions:
      functional: >
        Assemble a concrete, persisted set of intended purchases (a shopping list) drawn from this
        week's discounts across the Munich stores AND from items we need regardless of discount.
        See a running total of the list as items are added/removed. Sort discounted items cheapest-first
        and narrow the feed by store / category / product name (additive filters) to find items fast.
      emotional: >
        Feel in control of the household grocery budget rather than anxious about an unknown till total.
        Feel the shop is a deliberate, costed decision — not a surprise. Confidence replaces
        end-of-shop dread.
      social: >
        Shared household budget (me + my wife). Feel like a household that shops deliberately and
        does not overspend, without either of us doing tedious manual price maths.
    four_forces:
      push: >
        Today the app only tells me what I saved AFTER the fact (JOB-002) and builds a meal plan
        (JOB-001) — neither lets me deliberately assemble the actual shop and see its cost before I go.
        I still discover the real total at the till. I cannot include the non-discounted staples we
        always need alongside the deals, so the "cost of this shop" is never in one place.
      pull: >
        A single list I build by picking this week's cheapest items (and adding the staples we need),
        with a live running total, would tell me exactly what the shop costs before I leave — turning
        grocery spend from a surprise into a decision.
      anxiety: >
        What if the running total is wrong because a price is stale? What if I build a list and it is
        not there when I come back to it? What if adding a non-discounted item I just typed in throws
        off the total because it has no real price?
      habit: >
        Current workflow: browse discounts, maybe generate a meal plan, then shop and hope the total
        is reasonable. The list of "what I'm actually buying" lives in my head or on a scrap of paper,
        separate from the app; the app never knows the real shop.
    opportunity_score:
      importance: 5
      current_satisfaction: 1
      opportunity: 9
      rationale: >
        Highest importance — controlling household grocery spend is the stated main goal, a weekly
        recurring decision with direct monetary impact. Current satisfaction is near-zero for the
        FORWARD-looking half: the shipped app measures savings only retrospectively (JOB-002) and has
        no notion of "the shop I am about to make" or its cost before the till. NOTE: this high score
        comes from low satisfaction on forward spend control — it is NOT derived by rescoring JOB-001
        downward. JOB-001 keeps its own high opportunity as a supporting inspiration job.
    parent: null
    children: [JOB-002, JOB-001, JOB-003]

  - id: JOB-001
    title: "Weekly grocery planning driven by discounts"
    # HIERARCHY (product-overhaul, 2026-07-15): reframed from PRIMARY to SUPPORTING. Meal planning is
    # now inspiration / decision-support that feeds candidate items into the shop (JOB-004), not the
    # product's central goal. Statement, forces, and opportunity_score are UNCHANGED — the job is still
    # valid and still highly valuable; only its position in the hierarchy changed. Shipped stories keep
    # job_id: JOB-001 verbatim.
    parent: JOB-004
    hierarchy: supporting
    statement: >
      When I am planning my weekly grocery shopping and have no idea what discounts
      are available this week, I want to see what is cheapest RIGHT NOW across Aldi Süd,
      Edeka, and V-Markt in Munich and get a meal plan built around those discounts,
      so I can cook real meals all week and spend significantly less than if I shopped
      without looking at promotions first.
    dimensions:
      functional: >
        Identify discounted items from this week's flyers across all 3 Munich supermarkets,
        generate a 7-day meal plan based on those discounted items, filter by dietary restrictions,
        provide recipe links for each meal.
      emotional: >
        Feel smart and resourceful — like I took the time to shop cleverly without
        actually spending hours manually browsing flyer PDFs. Feel confident the plan
        uses real, available ingredients, not hypotheticals.
      social: >
        This is a private tool; social dimension is: feel like someone who does not
        waste money on full-price groceries when discounted alternatives are available.
    four_forces:
      push: >
        Manually browsing promotional flyers across 3 supermarket websites each Monday
        takes 30-45 minutes. The data is fragmented, JavaScript-heavy, mobile-hostile.
        Often I give up and just buy at full price, which feels wasteful.
      pull: >
        If I had a weekly feed of discounted items mapped to recipes I can cook,
        I would plan around those discounts automatically — saving money and decision
        fatigue simultaneously.
      anxiety: >
        What if the scraper breaks when the supermarket changes their website?
        What if the "discounted" price shown is wrong and I go to the store expecting
        one price and find another? What if the meal plan includes ingredients I cannot eat?
      habit: >
        Current workflow is: open Aldi app on Monday, browse manually, maybe screenshot
        a few items, then plan meals loosely around whatever I remembered. Very ad hoc.
    opportunity_score:
      importance: 5
      current_satisfaction: 1
      opportunity: 9
      rationale: >
        Extremely high importance (weekly recurring pain, real monetary impact) and
        nearly zero satisfaction with current manual process. Strongest opportunity
        in the product scope.
    usability_criteria:
      # Added by feature discount-hunt-ui (2026-07-15). Solution-quality ACs on the EXISTING
      # job — NOT a new job. The function ships; these raise the presentation bar for the
      # Monday planning moment on Dimitar's own devices (incl. phone).
      - "Discount feed and meal plan are readable at 375px with no horizontal scroll"
      - "Each planned meal that uses a discounted item shows its store + sale price inline (0 clicks)"
      - "Each discount card shows an explicit per-item saving amount (save €X)"

  - id: JOB-002
    title: "Track actual grocery savings vs full price"
    # HIERARCHY (product-overhaul, 2026-07-15): re-parented under JOB-004. Savings tracking is the
    # RETROSPECTIVE (after-the-shop) half of controlling grocery spend; JOB-004 adds the FORWARD half
    # (know the cost before the till). NOT folded or deleted — statement, forces, opportunity_score,
    # and job_id are UNCHANGED. Shipped savings stories keep job_id: JOB-002 verbatim.
    parent: JOB-004
    hierarchy: supporting
    statement: >
      When I finish my weekly shopping based on the discount meal plan, I want to see
      exactly how much money I saved compared to buying the same items at full price,
      so I can validate the app is actually worth using and feel the concrete payoff
      of planning around discounts.
    dimensions:
      functional: >
        Store both regular price and discounted price for every identified item.
        Calculate weekly and monthly savings totals. Display savings history over time.
      emotional: >
        Feel the reward of discipline — the number confirms the behavior was worth it.
        Feel motivated to keep using the app when savings accumulate visibly.
      social: >
        Private satisfaction; knowing concretely "I saved €18.40 this week" vs vague
        sense that discounts are good.
    four_forces:
      push: >
        Without tracking, the benefit of planning around discounts is invisible.
        It feels like effort with no proof of payoff. Easy to abandon the habit.
      pull: >
        A running total of monthly savings (e.g., "€74 saved in June") makes the
        value proposition tangible and self-reinforcing.
      anxiety: >
        What if the "regular price" the app stores is stale or from a different store?
        Is it comparing apples to apples across weeks?
      habit: >
        Currently: I have no savings tracking at all. I assume I am saving money
        but have no evidence.
    opportunity_score:
      importance: 4
      current_satisfaction: 0
      opportunity: 8
      rationale: >
        High importance as a motivational reinforcer; zero current satisfaction since
        no tracking exists. Strong opportunity, second after JOB-001.
    usability_criteria:
      # Added by feature discount-hunt-ui (2026-07-15). Solution-quality AC on the EXISTING job.
      - "The weekly SAVED figure is the first and most prominent element on the Savings page,
        legible above the fold at 375px (the emotional payoff must land at a glance)"

  - id: JOB-003
    title: "Ensure meal plan respects dietary restrictions"
    # HIERARCHY (product-overhaul, 2026-07-15): SUPPORTING safety constraint. Unchanged in scope, but
    # its reach extends: dietary compatibility now also constrains what appears in the discount feed
    # and shopping-list candidates, not only the meal plan. Statement/scores UNCHANGED; job_id verbatim.
    parent: JOB-004
    hierarchy: supporting
    statement: >
      When the app generates a weekly meal plan, I want it to automatically exclude
      ingredients and recipes that violate my dietary restrictions,
      so I do not have to manually review every suggested meal for compatibility.
    dimensions:
      functional: >
        Store user dietary restrictions as a persistent setting. Filter both discounted
        items and recipe suggestions against those restrictions before presenting.
      emotional: >
        Feel safe trusting the meal plan without double-checking every recipe.
        Reduce cognitive load of "is this actually OK for me to eat?"
      social: >
        N/A for single-user tool.
    four_forces:
      push: >
        A meal plan that includes foods I cannot eat is not just useless — it requires
        me to redo the planning work manually, which is worse than not having the tool.
      pull: >
        A meal plan I can trust to be edible requires zero review before shopping.
      anxiety: >
        What if a recipe ingredient is incompatible but listed generically? What if
        a restriction is partially honored (recipe is OK but suggested substitution is not)?
      habit: >
        Current workaround: manually verify every recipe. High effort, defeats the
        purpose of automation.
    opportunity_score:
      importance: 5
      current_satisfaction: 0
      opportunity: 9
      rationale: >
        Tied with JOB-001 on importance (a meal plan that ignores restrictions is unsafe/
        unusable). Zero satisfaction since no tool exists. Also 9.

# ─────────────────────────────────────────────────────────────────────────────
# HIERARCHY (SSOT summary of the reframe — feature product-overhaul, 2026-07-15)
# ─────────────────────────────────────────────────────────────────────────────
hierarchy:
  primary: JOB-004        # Control grocery spend across the whole shop (forward + retrospective)
  supporting:
    - JOB-002             # retrospective half of spend control (savings vs full price)
    - JOB-001             # inspiration / decision-support (discount-driven meal ideas)
    - JOB-003             # safety constraint (dietary compatibility on feed + list + plan)
  rationale: >
    The product's stated MAIN GOAL is managing grocery expenditure; meal planning is now SUPPORTING.
    JOB-004 is minted as the new primary (forward-looking spend control via an assembled, costed
    shopping list). JOB-002 becomes the retrospective half of the same spend-control job and is
    re-parented under JOB-004. JOB-001 and JOB-003 remain valid and unchanged in scope; they are
    repositioned as supporting jobs. No job was deleted, folded, or rescored downward. All existing
    IDs are preserved verbatim so shipped/in-flight stories keep their job_id traceability.

changelog:
  - date: "2026-07-13"
    feature: "discount-hunt"
    change: "Bootstrapped JOB-001/002/003 during greenfield DISCUSS wave."
  - date: "2026-07-15"
    feature: "discount-hunt-ui"
    change: "Added usability_criteria (solution-quality ACs) to JOB-001 and JOB-002. No new job."
  - date: "2026-07-15"
    feature: "product-overhaul"
    change: >
      STRATEGIC REFRAME. Minted JOB-004 (Control grocery spend across the whole shop) as the new
      PRIMARY job. Re-parented JOB-002 under JOB-004 (retrospective half of spend control). Marked
      JOB-001 and JOB-003 as SUPPORTING. Added a hierarchy block. All existing job statements, forces,
      and opportunity_scores are UNCHANGED; all IDs preserved verbatim. See feature-delta
      Changed-Assumptions section for the quoted prior framing and full rationale.
  - date: "2026-07-17"
    feature: "meal-plan-engine"
    change: >
      Meal planning (JOB-001, SUPPORTING) extended into a cost-minimizing, discount-maximizing engine
      IN SERVICE OF JOB-004 (control grocery spend). Today's placeholder meal plan (round-robin
      discount items as meal names) becomes real web-recipe generation (NEVER LLM-invented — dietary
      safety per JOB-003) whose product selection minimizes the total € to feed the week, preferring
      discounts where cheapest. This is NOT a re-elevation of meal planning to a product goal and NOT a
      new job: no job minted, deleted, renumbered, or rescored. JOB-001 stays SUPPORTING under JOB-004;
      its opportunity_score and statement are UNCHANGED. Feature stories all carry job_id JOB-001
      (parent JOB-004); dietary safety via JOB-003; savings display reuses JOB-002's computation. See
      docs/feature/meal-plan-engine/feature-delta.md (locked decisions D1-D8, D7 rejected alternatives,
      Changed-Assumptions) and the extended weekly-discount-meal-planning.yaml journey.
