---
# docs/product/personas/dimitar.yaml
# SSOT persona: Dimitar Apostolov — primary (and only) user of discount-hunt
# Bootstrapped during DISCUSS wave 2026-07-13

id: dimitar
name: Dimitar Apostolov
role: Software engineer, single-user app owner
location: Munich, Germany
language: English (app UI), German (supermarket context)

goals:
  - Minimize weekly grocery spend by shopping around discount promotions
  - Cook real meals at home rather than ordering out
  - Know exactly how much money the app saves him each week/month
  # Added by feature product-overhaul (2026-07-15):
  - Know what the weekly shop will cost BEFORE leaving for the store (not discover it at the till)
  - Assemble one deliberate list of what he's actually buying — cheapest items plus staples they need

household:
  # Added by feature product-overhaul (2026-07-15). The spend being controlled (JOB-004) is a
  # SHARED household budget: Dimitar + his wife. Still a single-user app (Dimitar operates it);
  # "household" describes whose money the budget represents, not additional user accounts.
  members: [Dimitar, wife]
  budget_owner: shared
  note: >
    The shopping list and its running total represent the household's intended shop, not just
    Dimitar's personal picks. No multi-user auth is implied — Dimitar is still the only operator.

frustrations:
  - Weekly flyer browsing across 3 supermarkets takes 30-45 minutes, mostly wasted effort
  - Discount information is buried in JS-heavy, scraping-hostile interfaces
  - No way to automatically connect "Aldi has oats on sale this week" to "I should make overnight oats on Monday"
  - No savings tracking — benefit is invisible, motivation decays

mental_model:
  - Thinks of the app as a "discount meal planner" not a generic recipe app
  - Expects the flow to be: discounts in → meal plan out (not: what do I want to eat → find ingredients)
  - Understands scraping risk; won't be surprised if the scraper occasionally breaks
  - Familiar with the concept of a "weekly flyer cycle" (German: Wochenangebote)

vocabulary:
  - Wochenangebote: weekly promotions / flyer deals
  - Angebot: promotional offer / discount
  - Stammpreis: regular price (used to compute savings)
  - Preisvergleich: price comparison

technical_profile:
  - Software engineer: comfortable with the app's internals
  - Will tolerate rough UI in v1 if core function works
  - "v2 (feature discount-hunt-ui, 2026-07-15): core function is now production-validated;
    with the function proven, the UI-tolerance no longer applies for the weekly-planning moment.
    Dimitar now expects the Monday planning flow to be readable and glanceable on his own
    devices INCLUDING his phone (375px) — no horizontal scroll, saved figure and per-meal
    discount visible without hunting. This is a solution-quality expectation on the EXISTING
    jobs (JOB-001/002/003), not a new job or a new in-store circumstance."
  - May inspect raw data directly if needed
  - Expected to run the app locally; no multi-user requirements

constraints:
  - Dietary restrictions: vegetarian (no meat, no fish); to be stored as per-user setting
  - Budget goal: reduce monthly grocery spend by 20-30% vs unplanned shopping

jobs_referenced:
  - JOB-004  # PRIMARY (product-overhaul): control grocery spend across the whole shop
  - JOB-001  # supporting: discount-driven meal planning
  - JOB-002  # supporting: savings tracking (retrospective spend control)
  - JOB-003  # supporting: dietary compliance
